name: Build Android 15 Fast Speed
on:
  workflow_dispatch: # Cho phép bấm nút kích hoạt bằng tay

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
    - name: Dọn dẹp ổ cứng máy chủ đám mây
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Cài đặt công cụ môi trường
      run: |
        sudo apt update
        sudo apt install bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev -y

    - name: Cấu hình công cụ Repo
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        export PATH="$HOME/bin:$PATH"
        git config --global user.name "GitHub Build"
        git config --global user.email "actions@github.com"

    - name: Tải mã nguồn Android 15 (Bản rút gọn siêu tốc)
      run: |
        export PATH="$HOME/bin:$PATH"
        mkdir -p ~/android
        cd ~/android
        repo init -u https://github.com -b lineage-22.0 --depth=1
        
        # Nạp cấu hình riêng của Nokia 6.1 (PL2)
        mkdir -p .repo/local_manifests
        echo '<?xml version="1.0" encoding="UTF-8"?><manifest><project name="RaghuVarma331/android_device_nokia_PL2" path="device/nokia/PL2" remote="github" revision="lineage-22.0" /><project name="RaghuVarma331/android_kernel_nokia_sdm660" path="kernel/nokia/sdm660" remote="github" revision="lineage-22.0" /><project name="TheMuppets/proprietary_vendor_nokia" path="vendor/nokia" remote="github" revision="lineage-22.0" /></manifest>' > .repo/local_manifests/nokia.xml
        
        # Đồng bộ dữ liệu tốc độ cao qua mạng GitHub
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Biên dịch hệ điều hành
      run: |
        export PATH="$HOME/bin:$PATH"
        cd ~/android
        export USE_CCACHE=1
        ccache -M 50G
        . build/envsetup.sh
        breakfast PL2
        mka bacon -j$(nproc --all)

    - name: Đẩy file ROM thành phẩm lên máy chủ tải về
      uses: actions/upload-artifact@v4
      with:
        name: Nokia-6.1-Android15-ZIP
        path: ~/android/out/target/product/PL2/*.zip
